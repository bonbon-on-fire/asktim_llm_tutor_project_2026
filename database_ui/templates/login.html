<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/chat.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/database.css') }}">
    <style>:root { --accent: {{ accent }}; }</style>
</head>
<body>
    <!-- Same look as the student app's username modal: a card over a dimmed overlay. -->
    <div class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="login-title">
        <div class="modal-card">
            <h2 id="login-title" class="modal-title">{{ title }}</h2>
            <p class="modal-body">Sign in to view AskTIM conversations.</p>
            <form class="modal-form" method="post" action="{{ url_for('database.login_submit') }}" autocomplete="off">
                <input type="password" name="password" class="email-input"
                       placeholder="Enter your password" aria-label="Review password" autofocus required>
                {% if error %}<div class="modal-error" role="alert">{{ error }}</div>{% endif %}
                <div class="modal-actions">
                    <button type="submit" class="modal-submit">Sign in</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
