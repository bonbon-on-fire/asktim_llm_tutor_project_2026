<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Humanities Tutor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      color: #1a1a1a;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    header h1 { font-size: 1.1rem; font-weight: 600; color: #2d3748; }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    #debug-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.82rem;
      color: #4a5568;
    }
    #debug-toggle input[type="checkbox"] { cursor: pointer; }

    .btn {
      border: 1px solid #cbd5e0;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 0.82rem;
      cursor: pointer;
      color: #4a5568;
      background: #fff;
      transition: background 0.15s;
    }
    .btn:hover:not(:disabled) { background: #edf2f7; }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .main {
      width: 100%;
      max-width: 780px;
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 0 12px;
    }

    /* ---- Config panel ---- */
    #config-panel {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 16px 20px;
      margin: 16px 0 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-end;
    }

    .config-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 130px;
      flex: 1;
    }
    .config-group label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #718096;
    }
    .config-group select {
      padding: 6px 10px;
      font-size: 0.85rem;
      border: 1px solid #cbd5e0;
      border-radius: 6px;
      background: #fff;
      color: #2d3748;
    }

    #btn-start {
      background: #38a169;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 20px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    #btn-start:hover:not(:disabled) { background: #2f855a; }
    #btn-start:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ---- Chat window ---- */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 12px 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: 14px;
      line-height: 1.55;
      font-size: 0.92rem;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.tutor {
      background: #fff;
      border: 1px solid #e2e8f0;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    .msg.student {
      background: #3b82f6;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .msg-label {
      font-size: 0.73rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 4px;
      color: #718096;
    }

    .reasoning {
      display: none;
      background: #fef3c7;
      border: 1px solid #fbbf24;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 8px;
      font-size: 0.85rem;
      line-height: 1.5;
      color: #78350f;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .reasoning.show { display: block; }
    .reasoning-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
      color: #92400e;
    }

    .bubble-wrap { display: flex; flex-direction: column; }
    .bubble-wrap.right { align-items: flex-end; }
    .bubble-wrap.left  { align-items: flex-start; }

    .typing {
      display: none;
      align-self: flex-start;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      border-bottom-left-radius: 4px;
      padding: 10px 16px;
    }
    .typing span {
      display: inline-block;
      width: 7px; height: 7px;
      background: #a0aec0;
      border-radius: 50%;
      margin: 0 2px;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-6px); }
    }

    /* ---- Student bot button ---- */
    #student-btn-row {
      display: flex;
      gap: 8px;
      padding: 8px 0;
    }

    .btn-student {
      flex: 1;
      padding: 9px 12px;
      font-size: 0.82rem;
      font-weight: 500;
      border: 1.5px solid #cbd5e0;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      color: #4a5568;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-student:hover:not(:disabled) { background: #edf2f7; border-color: #a0aec0; }
    .btn-student:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ---- Input row ---- */
    #input-row {
      display: flex;
      gap: 8px;
      padding: 10px 0 16px;
    }

    #msg-input {
      flex: 1;
      padding: 10px 14px;
      font-size: 0.92rem;
      border: 1.5px solid #cbd5e0;
      border-radius: 10px;
      outline: none;
      resize: none;
      line-height: 1.4;
      max-height: 120px;
      overflow-y: auto;
      font-family: inherit;
      background: #fff;
      transition: border-color 0.15s;
    }
    #msg-input:focus { border-color: #3b82f6; }

    #btn-send {
      padding: 10px 20px;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    #btn-send:hover:not(:disabled) { background: #2563eb; }
    #btn-send:disabled { opacity: 0.5; cursor: not-allowed; }

    #toast {
      display: none;
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #e53e3e;
      color: #fff;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 0.88rem;
      z-index: 100;
    }

    #empty-state {
      margin: auto;
      text-align: center;
      color: #a0aec0;
      font-size: 0.9rem;
      line-height: 1.8;
    }
    #empty-state strong { display: block; font-size: 1.1rem; color: #718096; margin-bottom: 6px; }
  </style>
</head>
<body>

<header>
  <h1>Humanities Tutor</h1>
  <div class="header-controls">
    <label id="debug-toggle">
      <input type="checkbox" id="debug-checkbox" />
      <span>Debug mode</span>
    </label>
    <span id="status-label">Configure &amp; start</span>
  </div>
</header>

<div class="main">
  <!-- Config panel -->
  <div id="config-panel">
    <div class="config-group">
      <label>Tutor prompt</label>
      <select id="sel-tutor"></select>
    </div>
    <div class="config-group">
      <label>Persona type</label>
      <select id="sel-persona-type"></select>
    </div>
    <div class="config-group">
      <label>Persona version</label>
      <select id="sel-persona-version"></select>
    </div>
    <div class="config-group">
      <label>Course</label>
      <select id="sel-course"></select>
    </div>
    <div class="config-group">
      <label>Exercise</label>
      <select id="sel-exercise"></select>
    </div>
    <button id="btn-start">Start conversation</button>
  </div>

  <!-- Chat -->
  <div id="chat">
    <div id="empty-state">
      <strong>Welcome!</strong>
      Configure the session above and click <em>Start conversation</em>.
    </div>
    <div class="typing" id="typing-indicator">
      <span></span><span></span><span></span>
    </div>
  </div>

  <!-- Student bot button -->
  <div id="student-btn-row">
    <button class="btn-student" id="btn-student-turn" disabled>Run student bot turn</button>
  </div>

  <!-- Input -->
  <div id="input-row">
    <textarea id="msg-input" rows="1" placeholder="Type your message..." disabled></textarea>
    <button id="btn-send" disabled>Send</button>
  </div>
</div>

<div id="toast"></div>

<script>
  const chatEl = document.getElementById('chat');
  const typingEl = document.getElementById('typing-indicator');
  const inputEl = document.getElementById('msg-input');
  const sendBtn = document.getElementById('btn-send');
  const startBtn = document.getElementById('btn-start');
  const studentBtn = document.getElementById('btn-student-turn');
  const emptyState = document.getElementById('empty-state');
  const statusLabel = document.getElementById('status-label');
  const toast = document.getElementById('toast');
  const debugCheckbox = document.getElementById('debug-checkbox');

  const selTutor = document.getElementById('sel-tutor');
  const selPersonaType = document.getElementById('sel-persona-type');
  const selPersonaVersion = document.getElementById('sel-persona-version');
  const selCourse = document.getElementById('sel-course');
  const selExercise = document.getElementById('sel-exercise');

  let busy = false;
  let lastRole = null;
  let configData = null;
  let started = false;

  function setStatus(text) { statusLabel.textContent = text; }

  function showToast(msg) {
    toast.textContent = msg;
    toast.style.display = 'block';
    setTimeout(() => { toast.style.display = 'none'; }, 3500);
  }

  function setBusy(state) {
    busy = state;
    sendBtn.disabled = state || !started;
    inputEl.disabled = state || !started;
    startBtn.disabled = state;
    studentBtn.disabled = state || !started || lastRole !== 'tutor';
    typingEl.style.display = state ? 'flex' : 'none';
    if (state) chatEl.scrollTop = chatEl.scrollHeight;
  }

  function fillSelect(el, items, valueKey) {
    el.innerHTML = '';
    items.forEach(item => {
      const opt = document.createElement('option');
      opt.value = valueKey ? item[valueKey] : item;
      opt.textContent = valueKey ? item[valueKey] : item;
      el.appendChild(opt);
    });
  }

  function appendBubble(role, text, label, reasoning) {
    if (emptyState) emptyState.remove();
    const wrap = document.createElement('div');
    wrap.className = `bubble-wrap ${role === 'tutor' ? 'left' : 'right'}`;

    if (reasoning && debugCheckbox.checked) {
      const rBox = document.createElement('div');
      rBox.className = 'reasoning show';
      const rLabel = document.createElement('div');
      rLabel.className = 'reasoning-label';
      rLabel.textContent = 'Pedagogical Reasoning';
      const rText = document.createElement('div');
      rText.textContent = reasoning;
      rBox.appendChild(rLabel);
      rBox.appendChild(rText);
      wrap.appendChild(rBox);
    }

    const lbl = document.createElement('div');
    lbl.className = 'msg-label';
    lbl.textContent = label || (role === 'tutor' ? 'Tutor' : 'You');

    const bubble = document.createElement('div');
    bubble.className = `msg ${role}`;
    bubble.textContent = text;

    wrap.appendChild(lbl);
    wrap.appendChild(bubble);
    chatEl.insertBefore(wrap, typingEl);
    chatEl.scrollTop = chatEl.scrollHeight;

    lastRole = role;
    studentBtn.disabled = busy || !started || lastRole !== 'tutor';
  }

  async function apiPost(url, body) {
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: 'Request failed.' }));
      throw new Error(err.error || 'Request failed.');
    }
    return res.json();
  }

  // ---- Load config options ----
  async function loadConfig() {
    try {
      const res = await fetch('/api/config-options');
      configData = await res.json();

      fillSelect(selTutor, configData.tutor_versions);
      fillSelect(selPersonaType, configData.persona_types);
      fillSelect(selCourse, configData.courses);

      updatePersonaVersions();
      updateExercises();
    } catch (e) {
      showToast('Failed to load config: ' + e.message);
    }
  }

  function updatePersonaVersions() {
    if (!configData) return;
    const type = selPersonaType.value;
    const versions = configData.persona_versions[type] || [];
    fillSelect(selPersonaVersion, versions);
  }

  function updateExercises() {
    if (!configData) return;
    const course = selCourse.value;
    const exercises = configData.course_exercises[course] || [];
    fillSelect(selExercise, exercises);
  }

  selPersonaType.addEventListener('change', updatePersonaVersions);
  selCourse.addEventListener('change', updateExercises);

  // ---- Start conversation ----
  startBtn.addEventListener('click', async () => {
    if (busy) return;
    setBusy(true);
    setStatus('Starting conversation...');

    chatEl.querySelectorAll('.bubble-wrap').forEach(el => el.remove());
    if (emptyState && emptyState.parentNode) emptyState.remove();
    lastRole = null;
    started = false;

    try {
      const data = await apiPost('/api/start', {
        tutor_version: selTutor.value,
        persona_type: selPersonaType.value,
        persona_version: selPersonaVersion.value,
        course: selCourse.value,
        exercise_num: selExercise.value,
        debug: debugCheckbox.checked,
      });
      started = true;
      appendBubble('tutor', data.tutor, undefined, data.reasoning);
      setStatus('Ready');
    } catch (e) {
      showToast(e.message);
      setStatus('Error');
    } finally {
      setBusy(false);
    }
  });

  // ---- Send user message ----
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || busy || !started) return;
    inputEl.value = '';
    autoResize();

    setBusy(true);
    setStatus('Thinking...');
    appendBubble('student', text);

    try {
      const data = await apiPost('/api/chat', { message: text, debug: debugCheckbox.checked });
      appendBubble('tutor', data.tutor, undefined, data.reasoning);
      setStatus('Ready');
    } catch (e) {
      showToast(e.message);
      setStatus('Error');
    } finally {
      setBusy(false);
    }
  }

  sendBtn.addEventListener('click', sendMessage);
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  // ---- Student bot turn ----
  studentBtn.addEventListener('click', async () => {
    if (busy || !started || lastRole !== 'tutor') return;
    setBusy(true);
    setStatus('Generating student + tutor turn...');

    try {
      const data = await apiPost('/api/student-turn', { debug: debugCheckbox.checked });
      const personaLabel = selPersonaType.value + '_' + selPersonaVersion.value;
      appendBubble('student', data.student, personaLabel);
      appendBubble('tutor', data.tutor, undefined, data.reasoning);
      setStatus('Ready');
    } catch (e) {
      showToast(e.message);
      setStatus('Error');
    } finally {
      setBusy(false);
    }
  });

  // ---- Debug toggle ----
  debugCheckbox.addEventListener('change', () => {
    document.querySelectorAll('.reasoning').forEach(box => {
      box.classList.toggle('show', debugCheckbox.checked);
    });
  });

  // ---- Auto-resize textarea ----
  function autoResize() {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  }
  inputEl.addEventListener('input', autoResize);

  // ---- Init ----
  loadConfig();
</script>
</body>
</html>
