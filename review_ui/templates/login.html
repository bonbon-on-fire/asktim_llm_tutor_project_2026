<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/chat.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/review.css') }}">
    <style>:root { --accent: {{ accent }}; }</style>
</head>
<body class="review-login-body">
    <form class="review-login-card" method="post" action="{{ url_for('review.login_submit') }}" autocomplete="off">
        <h1 class="review-login-title">{{ title }}</h1>
        <p class="review-login-sub">Enter the review password to continue.</p>
        {% if error %}<div class="review-login-error" role="alert">{{ error }}</div>{% endif %}
        <input type="password" name="password" class="review-login-input"
               placeholder="Password" aria-label="Review password" autofocus required>
        <button type="submit" class="review-login-button">Sign in</button>
    </form>
</body>
</html>
