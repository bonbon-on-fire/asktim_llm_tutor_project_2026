<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutor — {{ course }} / exercise {{ exercise }}</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            margin: 0;
            padding: 0;
            color: #2a2a2a;
            background: #fafafa;
        }
        main {
            max-width: 720px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }
        .placeholder {
            text-align: center;
            padding: 4rem 0;
            color: #888;
            font-size: 1rem;
        }
        .meta {
            text-align: center;
            color: #aaa;
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <script type="application/json" id="tutor-config">{{ tutor_config | tojson }}</script>
    <main>
        <div id="app">
            <p class="placeholder">Tutor loading…</p>
            <p class="meta">{{ course }} · exercise {{ exercise }} · {{ tutor }}</p>
        </div>
    </main>
</body>
</html>
