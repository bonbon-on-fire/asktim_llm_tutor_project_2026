<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AskTIM — {{ course }} / exercise {{ exercise }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/chat.css') }}">
</head>
<body>
    <script type="application/json" id="tutor-config">{{ tutor_config | tojson }}</script>

    <header class="tutor-header">
        <span class="tutor-meta">{{ course }} · exercise {{ exercise }} · {{ tutor }}</span>
    </header>

    <main class="chat">
        <ol class="message-list" id="message-list" aria-live="polite" aria-label="Conversation"></ol>

        <div class="error-banner" id="error-banner" role="alert" hidden>
            <span class="error-text" id="error-text"></span>
            <button class="error-dismiss" id="error-dismiss" type="button" aria-label="Dismiss error">&times;</button>
        </div>

        <form class="composer" id="composer" autocomplete="off">
            <span class="thinking" id="thinking" aria-live="polite" hidden>AskTIM is thinking…</span>
            <div class="composer-bar">
                <textarea
                    id="composer-input"
                    class="composer-input"
                    placeholder="Ask anything"
                    rows="1"
                    aria-label="Your message to AskTIM"></textarea>
                <button type="submit" id="send-button" class="send-button" aria-label="Send" disabled>
                    <svg class="send-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
                    </svg>
                </button>
            </div>
        </form>
    </main>

    <script src="{{ url_for('static', filename='js/chat.js') }}" defer></script>
</body>
</html>
