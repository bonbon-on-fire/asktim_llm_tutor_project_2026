<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AskTIM Sandbox</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/chat.css') }}">
</head>
<body data-has-email="{{ 'true' if has_email else 'false' }}">
    <script type="application/json" id="tutor-config">{{ tutor_config | tojson }}</script>

    <header class="course-banner">
        <span class="course-name">{{ course_name }}</span>
    </header>

    <button type="button" class="history-toggle" id="history-toggle" aria-label="Open sidebar" title="Open sidebar">
        <svg class="history-toggle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="3" y="4" width="18" height="16" rx="2"/>
            <line x1="9" y1="4" x2="9" y2="20"/>
        </svg>
    </button>

    <div class="layout">
    <aside class="sidebar" id="sidebar" aria-label="Past conversations">
        <div class="sidebar-inner">
            <div class="sidebar-header">
                <h2 id="sidebar-title" class="sidebar-title">AskTIM <span class="beta-tag">· Sandbox Beta</span></h2>
                <button type="button" class="sidebar-close" id="sidebar-close" aria-label="Close sidebar" title="Close sidebar">
                    <svg class="sidebar-close-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <rect x="3" y="4" width="18" height="16" rx="2"/>
                        <line x1="9" y1="4" x2="9" y2="20"/>
                    </svg>
                </button>
            </div>
            <button type="button" class="sidebar-cta sidebar-cta-primary" id="create-context" title="Edit course, exercise, tutor or syllabus">
                <svg class="sidebar-cta-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <line x1="4" y1="21" x2="4" y2="14"/>
                    <line x1="4" y1="10" x2="4" y2="3"/>
                    <line x1="12" y1="21" x2="12" y2="12"/>
                    <line x1="12" y1="8" x2="12" y2="3"/>
                    <line x1="20" y1="21" x2="20" y2="16"/>
                    <line x1="20" y1="12" x2="20" y2="3"/>
                    <line x1="1" y1="14" x2="7" y2="14"/>
                    <line x1="9" y1="8" x2="15" y2="8"/>
                    <line x1="17" y1="16" x2="23" y2="16"/>
                </svg>
                <span>Edit context</span>
            </button>
            <button type="button" class="sidebar-cta sidebar-cta-primary" id="add-email" title="Add your email" hidden>
                <svg class="sidebar-cta-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                    <polyline points="22,6 12,13 2,6"/>
                </svg>
                <span>Add email</span>
            </button>
            <button type="button" class="sidebar-cta" id="new-chat" title="Start a new chat">
                <svg class="sidebar-cta-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M12 20h9"/>
                    <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
                </svg>
                <span>New chat</span>
            </button>
            <div class="sidebar-empty" id="sidebar-empty" hidden></div>
            <ul class="sidebar-list" id="sidebar-list"></ul>
        </div>
    </aside>

    <main class="chat">
        <ol class="message-list" id="message-list" aria-live="polite" aria-label="Conversation"></ol>

        <div class="error-banner" id="error-banner" role="alert" hidden>
            <span class="error-text" id="error-text"></span>
            <button class="error-dismiss" id="error-dismiss" type="button" aria-label="Dismiss error">&times;</button>
        </div>

        <form class="composer" id="composer" autocomplete="off">
            <div class="composer-previews" id="composer-previews" hidden aria-label="Attached images"></div>
            <div class="composer-bar">
                <input type="file" id="image-input" class="image-input" accept="image/png,image/jpeg" multiple hidden>
                <button type="button" id="attach-button" class="attach-button" aria-label="Attach image" title="Attach image">
                    <svg class="attach-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                    </svg>
                </button>
                <textarea
                    id="composer-input"
                    class="composer-input"
                    placeholder="Ask anything"
                    rows="1"
                    aria-label="Your message to AskTIM"></textarea>
                <button type="submit" id="send-button" class="send-button" aria-label="Send prompt" title="Send prompt" disabled>
                    <svg class="send-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
                    </svg>
                </button>
            </div>
        </form>
    </main>
    </div>

    <div class="detail-view" id="detail-view" hidden>
        <div class="detail-header">
            <button type="button" class="detail-back" id="detail-back">&larr; Back</button>
            <div class="detail-meta" id="detail-meta"></div>
        </div>
        <ol class="detail-messages" id="detail-messages" aria-label="Past conversation"></ol>
    </div>

    <div class="modal-overlay" id="email-modal" role="dialog" aria-modal="true"
         aria-labelledby="email-modal-title" aria-describedby="email-modal-body" hidden>
        <div class="modal-card">
            <h2 id="email-modal-title" class="modal-title">Help us track your progress</h2>
            <p id="email-modal-body" class="modal-body">
                Use your course email to save your chats across devices — they
                stay private to you.
            </p>
            <form id="email-form" class="modal-form" autocomplete="off" novalidate>
                <input
                    type="text"
                    id="email-input"
                    class="email-input"
                    placeholder="Enter your email"
                    aria-label="Your email"
                    autocomplete="email"
                    title="">
                <div id="password-stage" class="password-stage" hidden>
                    <div class="email-recap">
                        <span id="email-display" class="email-display-value"></span>
                        <button type="button" id="email-change" class="email-change">Change</button>
                    </div>
                    <input
                        type="password"
                        id="password-input"
                        class="email-input"
                        placeholder="Create a password (6+ characters)"
                        aria-label="Your password"
                        autocomplete="current-password"
                        title="">
                    <p id="password-hint" class="password-hint"></p>
                </div>
                <div class="modal-error" id="email-error" role="alert" hidden></div>
                <div class="modal-actions">
                    <button type="button" id="email-skip" class="modal-skip">Skip</button>
                    <button type="submit" id="email-submit" class="modal-submit" disabled>Next</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="create-modal" role="dialog" aria-modal="true"
         aria-labelledby="create-modal-title" hidden>
        <div class="modal-card">
            <h2 id="create-modal-title" class="modal-title">Configure the context settings</h2>
            <p id="create-step-label" class="modal-body"></p>
            <form id="create-form" class="modal-form" autocomplete="off">
                <div id="create-step-body" class="create-step-body"></div>
                <div class="modal-error" id="create-error" role="alert" hidden></div>
                <div class="modal-actions create-actions">
                    <button type="button" id="create-cancel" class="modal-skip">Cancel</button>
                    <span class="create-actions-right">
                        <button type="button" id="create-back" class="modal-skip" hidden>Back</button>
                        <button type="submit" id="create-next" class="modal-submit">Continue</button>
                    </span>
                </div>
            </form>
        </div>
    </div>

    <!-- Markdown rendering for tutor messages: marked parses GFM (incl. tables),
         DOMPurify sanitizes the HTML to keep the no-raw-innerHTML XSS guarantee.
         Vendored locally (not a CDN) so they always load offline / behind a VPN
         and bake into the container image. Loaded with defer so they run, in
         order, before chat.js. -->
    <script src="{{ url_for('static', filename='js/marked.min.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/dompurify.min.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/chat.js', v='5') }}" defer></script>
</body>
</html>
